name: Linux

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'packaging/**'
      - 'util/**'
      - 'uml/**'
      - '**.md'
      - '**.svg'
      - '**.png'
    branches-ignore:
      - 'noactions/*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'packaging/**'
      - 'util/**'
      - 'uml/**'
      - '**.md'
      - '**.svg'
      - '**.png'
    branches-ignore:
      - 'noactions/*'

jobs:
  build-ubuntu:
    runs-on: ubuntu-26.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Update package database
      run: sudo apt -y update
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        max-size: "2000M"
    - name: Install deps
      run: sudo apt -y install git make grcov ninja-build pkg-config gcc g++ ccache cmake robin-map-dev libyaml-cpp-dev llvm-22 clang-22 libclang-22-dev libclang-cpp22-dev clang-tools-22 clang-format-22 lcov zlib1g-dev libunwind-dev libdw-dev gnustep-back-common libgnustep-base-dev gnustep-make
    - name: Check code formatting
      run: |
        make check-formatting
    - name: Build and unit test
      run: |
        CC=/usr/bin/clang-22 CXX=/usr/bin/clang++-22 LLVM_VERSION=22 NUMPROC=2 CMAKE_GENERATOR=Ninja CODE_COVERAGE=ON LLVM_VERSION=22 ENABLE_CXX_MODULES_TEST_CASES=ON ENABLE_CUDA_TEST_CASES=OFF ENABLE_OBJECTIVE_C_TEST_CASES=ON FETCH_LIBOBJC2=ON CLANG_UML_ENABLE_BACKTRACE=ON make test
    - name: Test --dump-config
      run: |
        make test_dump_config
    - name: Run coverage
      run: |
        grcov --llvm --binary-path debug --output-path coverage.info -t lcov --keep-only 'src/*' --source-dir . --ignore src/main.cc --ignore src/common/generators/generators.cc  .
        lcov --ignore-errors inconsistent,format --erase-functions '__cxx_global_var_init' -l coverage.info
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: coverage.info
        disable_search: true
        name: clang-uml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false